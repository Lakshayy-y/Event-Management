<!DOCTYPE html>
<html>
<head>
  <title>Student Details Table</title>
</head>
<body>

  <!-- Example of a Block Element -->
  <h2>Student Details</h2> 
  <!-- h2 is a block element, it takes the full width -->

  <!-- Table to show Roll No, Name, Marks, and Grade -->
  <table border="2">
    <tr>
      <th>Roll No.</th>
      <th>Name</th>
      <th>Marks</th>
      <th>Grade</th>
    </tr>
    <tr>
      <td>101</td>
      <td>Riya Sharma</td>
      <td>85</td>
      <td>A</td>
    </tr>
    <tr>
      <td>102</td>
      <td>Arjun Patel</td>
      <td>78</td>
      <td>B+</td>
    </tr>
    <tr>
      <td>103</td>
      <td>Neha Verma</td>
      <td>92</td>
      <td>A+</td>
    </tr>
    <tr>
      <td>104</td>
      <td>Rohit Kumar</td>
      <td>68</td>
      <td>B</td>
    </tr>
  </table>

  <!-- Example of another Block Element -->
  <p>This table shows the marks and grades of students in the class.</p>
  <!-- p is a block element (starts on a new line) -->

  <!-- Example of Inline Elements -->
  <p>
    Here <b>Riya</b> scored the highest marks and <span style="color:green;">got an A grade</span>.
  </p>
  <!-- b and span are inline elements; they don’t start on a new line -->

</body>
</html>
